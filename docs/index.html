<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Asset Injector</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/html-midi-player@1.5.0"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="header-left">
            <h1>Castle Asset Injector</h1>
        </div>
        <div class="header-right">
            <div id="profileContainer" class="profile-pill logged-out" onclick="toggleProfileMenu()">
                <span id="profileText">Log Into CLI</span>
            </div>
            <div id="profileMenu" class="dropdown-menu">
                <button onclick="logout()">Log Out</button>
                <button class="danger" onclick="clearAllData()">Delete All Data</button>
            </div>
        </div>
    </header>

    <div class="workspace">
        
        <aside class="left-panel">
            <div class="panel-header">
                <button onclick="showModal('newDeckModal')">New Deck</button>
                <button onclick="showModal('loadDeckModal')">Load Deck</button>
            </div>
            <div class="file-tree-container" id="fileTree">
                <p class="empty-state">No decks loaded. Create or load a deck to begin.</p>
            </div>
        </aside>

        <main class="center-panel">
            <div id="previewContainer" class="preview-box">
                <img id="centerImagePreview" src="" style="display:none;">
                <p id="blueprintLabel" class="blueprint-label">Select a blueprint to begin editing</p>
            </div>
        </main>

        <aside class="right-panel">
            <form id="modifyForm">
                
                <div class="settings-section">
                    <h3>Image Settings</h3>
                    <input type="file" id="imageFile" accept="image/*,video/mp4,video/quicktime">
                    
                    <div class="split-inputs mt-2">
                        <div>
                            <label>Width</label>
                            <input type="number" id="sizeW" placeholder="Auto">
                        </div>
                        <div>
                            <label>Height</label>
                            <input type="number" id="sizeH" placeholder="Auto">
                        </div>
                    </div>
                    
                    <div class="input-group mt-2">
                        <label>Colors (1-256)</label>
                        <input type="number" id="quantizeFlag" placeholder="Default">
                    </div>

                    <div id="videoOptions" class="dynamic-group" style="display:none;">
                        <label>Skip Frames</label>
                        <input type="number" id="skipFramesFlag" placeholder="1">
                    </div>

                    <div id="svgOptions" class="dynamic-group" style="display:none;">
                        <div class="split-inputs">
                            <div>
                                <label>SVG Scale</label>
                                <input type="text" id="svgScaleFlag" placeholder="1.0">
                            </div>
                            <div>
                                <label>Bezier Steps</label>
                                <input type="number" id="svgStepsFlag" placeholder="16">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Audio Settings</h3>
                    <input type="file" id="midiFile" accept=".mid,.midi">
                    
                    <div id="midiVisualizerContainer" class="mt-2" style="display:none;">
                        <midi-visualizer type="piano-roll" id="midiViz"></midi-visualizer>
                    </div>
                </div>

                <button type="submit" id="submitRunBtn" class="action-btn mt-3" disabled>Apply Changes</button>
                <div id="statusMessage" class="status-message"></div>
            </form>
        </aside>

    </div>

    <div id="newDeckModal" class="modal">
        <div class="modal-content">
            <h3>Generate New Deck</h3>
            <input type="text" id="newDeckName" placeholder="Deck Name">
            <div class="modal-actions">
                <button class="secondary" onclick="hideModal('newDeckModal')">Cancel</button>
                <button onclick="initDeck()">Create</button>
            </div>
        </div>
    </div>

    <div id="loadDeckModal" class="modal">
        <div class="modal-content">
            <h3>Load Deck</h3>
            <input type="text" id="loadDeckId" placeholder="Deck ID">
            <div class="modal-actions">
                <button class="secondary" onclick="hideModal('loadDeckModal')">Cancel</button>
                <button onclick="pullDeck()">Load</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
